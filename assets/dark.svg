<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610" role="img" aria-labelledby="title desc">
<title id="title">Rajveerr Awachat GitHub Hero Banner</title>
<desc id="desc">Animated premium dark GitHub profile banner.</desc>

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#09090b">
      <animate attributeName="stop-color" values="#09090b;#111827;#09090b" dur="12s" repeatCount="indefinite"/>
    </stop>
    <stop offset="100%" stop-color="#0f172a"/>
  </linearGradient>

  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#22d3ee"/>
    <stop offset="50%" stop-color="#8b5cf6"/>
    <stop offset="100%" stop-color="#3b82f6"/>
    <animateTransform attributeName="gradientTransform"
      type="rotate" from="0 .5 .5" to="360 .5 .5"
      dur="20s" repeatCount="indefinite"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M40 0H0V40" fill="none" stroke="#ffffff12"/>
  </pattern>
</defs>

<rect width="1180" height="610" rx="30" fill="url(#bg)"/>
<rect width="1180" height="610" rx="30" fill="url(#grid)"/>

<circle cx="930" cy="120" r="170" fill="#8b5cf620" filter="url(#glow)">
  <animate attributeName="r" values="170;190;170" dur="8s" repeatCount="indefinite"/>
</circle>

<circle cx="260" cy="520" r="130" fill="#22d3ee18" filter="url(#glow)">
  <animate attributeName="cx" values="260;280;260" dur="10s" repeatCount="indefinite"/>
</circle>

<rect x="55" y="55" width="1070" height="500" rx="28" fill="#ffffff08" stroke="#ffffff18"/>

<text x="95" y="120" fill="white" font-size="42" font-family="Segoe UI,Arial" font-weight="700">
Rajveerr Awachat
</text>

<text x="95" y="160" fill="#b8c0cc" font-size="20" font-family="Segoe UI,Arial">
AI Engineer • Software Developer • Robotics Enthusiast
</text>

<text x="95" y="198" fill="#9ca3af" font-size="16" font-family="Segoe UI,Arial">
B.Tech CSE @ Ramdeobaba University • Nagpur, India
</text>

<rect x="95" y="235" width="510" height="170" rx="18" fill="#0b1220cc" stroke="#2a3444"/>

