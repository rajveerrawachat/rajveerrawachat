<text x="115" y="300" fill="#e5e7eb" font-size="15" font-family="Consolas,monospace">
Current Focus: AI Agents | Robotics | Computer Vision
</text>

<text x="115" y="328" fill="#e5e7eb" font-size="15" font-family="Consolas,monospace">
