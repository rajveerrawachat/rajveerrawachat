</text>

<text x="115" y="356" fill="#e5e7eb" font-size="15" font-family="Consolas,monospace">
Status: Always Learning_
<animate attributeName="opacity" values="1;1;1;0" dur="1s" repeatCount="indefinite"/>
</text>

