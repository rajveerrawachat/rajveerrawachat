<circle r="90" fill="none" stroke="url(#accent)" stroke-width="2">
<animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
</circle>

<circle r="70" fill="none" stroke="#22d3ee55"/>

<path d="M-20,-10 Q0,-40 20,-10 M-28,20 Q0,55 28,20 M-40,-55 L40,-55 M-55,-70 L55,-70"
stroke="url(#accent)" stroke-width="2" fill="none"/>

<circle r="4" fill="#22d3ee"/>
